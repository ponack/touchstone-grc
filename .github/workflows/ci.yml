name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# No workflow-level permissions — each job declares only what it needs.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed by git-auto-commit-action
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: touchstone_test
          POSTGRES_USER: touchstone
          POSTGRES_PASSWORD: touchstone
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5  # zizmor: ignore[artipacked] — git-auto-commit-action requires stored credentials
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: "1.25"
          cache: false

      - name: Tidy
        working-directory: api
        run: go mod tidy

      - name: Run migrations
        working-directory: api
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: touchstone_test
          POSTGRES_USER: touchstone
          POSTGRES_PASSWORD: touchstone
          TOUCHSTONE_SECRET_KEY: ci-placeholder
        run: go run ./cmd/touchstone migrate

      - name: Vet
        working-directory: api
        run: go vet ./...

      - name: Test
        working-directory: api
        env:
          TEST_DATABASE_URL: postgres://touchstone:touchstone@localhost:5432/touchstone_test?sslmode=disable
        run: go test -race ./...

      - name: Build
        working-directory: api
        run: go build ./cmd/touchstone

      - name: Commit go.sum if changed
        if: github.event_name == 'push' && github.ref_type == 'branch' && github.ref_name != 'main'
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9  # v7
        with:
          commit_message: "chore: update go.sum"
          file_pattern: "api/go.sum api/go.mod"

  ui:
    name: UI (SvelteKit)
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed by git-auto-commit-action
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5  # zizmor: ignore[artipacked] — git-auto-commit-action requires stored credentials
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5
        with:
          version: 10

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5  # zizmor: ignore[cache-poisoning] — cache: "" explicitly disables caching
        with:
          node-version: "24"
          cache: ""

      - name: Install
        working-directory: ui
        run: pnpm install --no-frozen-lockfile

      - name: Sync SvelteKit types
        working-directory: ui
        run: pnpm svelte-kit sync

      - name: Check types
        working-directory: ui
        run: pnpm svelte-check

      - name: Build
        working-directory: ui
        run: pnpm build

      - name: Commit lockfile if changed
        if: github.event_name == 'push' && github.ref_type == 'branch' && github.ref_name != 'main'
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9  # v7
        with:
          commit_message: "chore: update pnpm-lock.yaml"
          file_pattern: "ui/pnpm-lock.yaml"

  lint:
    name: Lint (Go)
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed by git-auto-commit-action (gofmt)
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5  # zizmor: ignore[artipacked] — git-auto-commit-action requires stored credentials
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: "1.25"
          cache: false

      - name: Install linters
        run: |
          go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
          go install github.com/client9/misspell/cmd/misspell@latest
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/gordonklaus/ineffassign@latest

      - name: gofmt
        run: gofmt -w api/

      - name: Commit gofmt changes
        if: github.event_name == 'push' && github.ref_type == 'branch' && github.ref_name != 'main'
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9  # v7
        with:
          commit_message: "chore: gofmt"
          file_pattern: "api/**/*.go"

      - name: go vet
        working-directory: api
        run: go vet ./...

      - name: staticcheck
        working-directory: api
        run: staticcheck ./...

      - name: gocyclo
        run: gocyclo -over 15 api/

      - name: ineffassign
        working-directory: api
        run: ineffassign ./...

      - name: misspell
        run: misspell -error api/ docs/ README.md

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [api, ui, lint]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - name: Resolve version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "value=$REF_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "value=edge" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: API image metadata
        id: meta-api
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ghcr.io/ponack/touchstone-api
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: UI image metadata
        id: meta-ui
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ghcr.io/ponack/touchstone-ui
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push API image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: deploy/Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          build-args: VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push UI image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: deploy/Dockerfile.ui
          push: true
          tags: ${{ steps.meta-ui.outputs.tags }}
          labels: ${{ steps.meta-ui.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$REF_NAME" > /dev/null 2>&1; then
            echo "Release $REF_NAME already exists — skipping creation."
          else
            gh release create "$REF_NAME" \
              --title "Touchstone $REF_NAME" \
              --generate-notes \
              --verify-tag
          fi

  zizmor:
    name: GitHub Actions security (zizmor)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          persist-credentials: false

      - uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e  # v0.5.3
        with:
          min-severity: medium
