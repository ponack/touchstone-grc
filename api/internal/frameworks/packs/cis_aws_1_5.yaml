code: cis_aws_1_5
name: CIS AWS Foundations Benchmark v1.5.0
version: "1.5.0"
description: |
  CIS Amazon Web Services Foundations Benchmark v1.5.0 — a community-
  driven baseline for AWS account hardening. Touchstone ships rules
  in batches as the underlying AWS scanner data becomes available:
  this first batch covers Section 1 (IAM) account-level checks
  backed by GetAccountSummary and GetAccountPasswordPolicy.
  Subsequent batches will cover user-level IAM, then Section 2
  (Storage), 3 (Logging), 4 (Monitoring), 5 (Networking).

controls:
  - code: "1.4"
    title: Ensure no 'root' user account access key exists
    description: |
      The root user is the most privileged identity in an AWS account.
      Access keys give programmatic access at that privilege level —
      catastrophic if leaked. CIS 1.4 fails when the root account has
      any access key configured (active or inactive).
    severity: critical
    policy_path: cis_aws_1_5/cis_1_4.rego

  - code: "1.5"
    title: Ensure MFA is enabled for the 'root' user account
    description: |
      The root user must require multi-factor authentication. Virtual
      MFA satisfies CIS 1.5; CIS 1.6 tightens the requirement to
      hardware MFA only.
    severity: critical
    policy_path: cis_aws_1_5/cis_1_5.rego

  - code: "1.6"
    title: Ensure hardware MFA is enabled for the 'root' user account
    description: |
      Stricter sibling of CIS 1.5. The root user's MFA must be a
      hardware device — virtual MFA does not satisfy this rule.
      Touchstone reads ListVirtualMFADevices and flags the account
      when the root user is bound to a virtual device or has no MFA
      at all.
    severity: critical
    policy_path: cis_aws_1_5/cis_1_6.rego

  - code: "1.8"
    title: Ensure IAM password policy requires minimum length of 14 or greater
    description: |
      The account password policy must require at least 14 characters
      for IAM user passwords. Long passwords resist brute-force and
      credential-stuffing attacks more effectively than complexity
      rules alone. CIS 1.8 fails when no policy is configured or when
      minimum_password_length is below 14.
    severity: high
    policy_path: cis_aws_1_5/cis_1_8.rego

  - code: "1.9"
    title: Ensure IAM password policy prevents password reuse
    description: |
      The account password policy must remember at least the last 24
      passwords and prevent their reuse. CIS 1.9 fails when no policy
      is configured or when password_reuse_prevention is below 24.
    severity: high
    policy_path: cis_aws_1_5/cis_1_9.rego

  - code: "1.10"
    title: Ensure MFA is enabled for all IAM users that have a console password
    description: |
      Every IAM user with a console login profile must carry at least
      one MFA device. CIS 1.10 evaluates the same evidence as SOC 2
      CC6.1's AWS surface, framed per-user instead of as a single
      account-wide outcome.
    severity: critical
    policy_path: cis_aws_1_5/cis_1_10.rego

  - code: "1.12"
    title: Ensure credentials unused for 45 days or greater are disabled
    description: |
      Console passwords and Active access keys that have been
      unused for more than 45 days (or never used after a 45-day
      grace window since creation) must be disabled. CIS 1.12 covers
      both credential types in one rule.
    severity: high
    policy_path: cis_aws_1_5/cis_1_12.rego

  - code: "1.13"
    title: Ensure there is only one active access key per IAM user
    description: |
      Each IAM user must have at most one currently-Active access key.
      Two active keys indicate that rotation became "create a second
      key" rather than "rotate the existing one", leaving the
      superseded credential in circulation.
    severity: medium
    policy_path: cis_aws_1_5/cis_1_13.rego

  - code: "1.14"
    title: Ensure access keys are rotated every 90 days or less
    description: |
      Every Active IAM access key must have been created within the
      last 90 days. Inactive keys are out of scope — they are not in
      circulation. Same evidence as SOC 2 CC6.3 but a stricter
      90-day threshold instead of 365.
    severity: high
    policy_path: cis_aws_1_5/cis_1_14.rego

  - code: "1.15"
    title: Ensure IAM Users Receive Permissions Only Through Groups
    description: |
      Permissions should flow to IAM users through group membership,
      not via policies attached or inlined directly on the user. CIS
      1.15 fails when any user carries a non-zero count of
      attached_policies or inline_policies — even if the effective
      access happens to be safe, the administrative pattern is what
      the rule guards.
    severity: medium
    policy_path: cis_aws_1_5/cis_1_15.rego

  - code: "1.16"
    title: Ensure IAM policies that allow full "*:*" administrative privileges are not attached
    description: |
      Customer-managed policies that grant Action="*" + Resource="*"
      and that are currently attached to any principal are CIS 1.16
      findings. AWS-managed policies (AdministratorAccess and
      friends) are intentionally out of scope per CIS — the rule
      targets customer-defined admin policies that should be
      retired.
    severity: high
    policy_path: cis_aws_1_5/cis_1_16.rego

  - code: "1.17"
    title: Ensure a support role has been created to manage incidents with AWS Support
    description: |
      At least one IAM principal (user, group, or role) must hold the
      AWS managed AWSSupportAccess policy so support tickets can be
      opened without escalating to root. CIS 1.17 fails when no
      principal carries the policy.
    severity: medium
    policy_path: cis_aws_1_5/cis_1_17.rego

  - code: "1.19"
    title: Ensure that all the expired SSL/TLS certificates stored in AWS IAM are removed
    description: |
      Any IAM-uploaded server certificate whose expiration has
      already passed is a CIS 1.19 finding. Certs with no expiration
      field (legacy uploads) pass; ACM-managed certs are tracked
      separately.
    severity: medium
    policy_path: cis_aws_1_5/cis_1_19.rego

  - code: "1.21"
    title: Ensure IAM Access Analyzer is enabled for all regions
    description: |
      Every region in the operator's scope must carry at least one
      active IAM Access Analyzer. The analyzer surfaces unintended
      external sharing of IAM-managed resources (S3 buckets, KMS
      keys, IAM roles, …). CIS 1.21 fails when any configured
      region lacks an active analyzer.
    severity: high
    policy_path: cis_aws_1_5/cis_1_21.rego
