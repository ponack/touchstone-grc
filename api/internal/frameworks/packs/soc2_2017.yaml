code: soc2_2017
name: SOC 2 Trust Services Criteria (2017)
version: "2017"
description: |
  AICPA Trust Services Criteria, Common Criteria (CC) subset. This
  initial pack focuses on the controls that map cleanly to read-only
  AWS evidence: logical access controls (CC6.x) and system operations
  (CC7.x). Additional CC families will land in follow-up pack updates.

controls:
  - code: CC6.1
    title: Logical and physical access controls
    description: |
      The entity implements logical access security software,
      infrastructure, and architectures over protected information
      assets to protect them from security events. Touchstone evaluates
      this against IAM users (MFA enabled, no console access for service
      accounts) and root account usage.
    severity: high
    policy_path: soc2_2017/cc6_1.rego

  - code: CC6.2
    title: New user access provisioning
    description: |
      Prior to issuing system credentials and granting system access,
      the entity registers and authorizes new internal and external
      users. Evaluated against IAM users created within the scan window
      and the presence of approval metadata (tags / IaC source).
    severity: medium
    policy_path: soc2_2017/cc6_2.rego

  - code: CC6.3
    title: User access revocation
    description: |
      The entity authorizes, modifies, or removes access to data,
      software, functions, and other protected information assets
      based on roles, responsibilities, or system design and changes.
      Evaluated against stale IAM users / access keys (last used more
      than N days ago).
    severity: high
    policy_path: soc2_2017/cc6_3.rego

  - code: CC6.6
    title: Network access controls
    description: |
      The entity implements logical access security measures to
      protect against threats from sources outside its system
      boundaries. Evaluated against security groups with 0.0.0.0/0
      ingress on sensitive ports and public S3 buckets.
    severity: critical
    policy_path: soc2_2017/cc6_6.rego

  - code: CC6.7
    title: Restricted data transmission
    description: |
      The entity restricts the transmission, movement, and removal of
      information to authorized users, systems, and devices. Evaluated
      against TLS-only enforcement on S3 buckets and load balancers,
      and RDS in-transit encryption.
    severity: high
    policy_path: soc2_2017/cc6_7.rego

  - code: CC6.8
    title: Malicious software prevention
    description: |
      The entity implements controls to prevent or detect and act upon
      the introduction of unauthorized or malicious software.
      Evaluated against GuardDuty being enabled in every monitored
      region.
    severity: high
    policy_path: soc2_2017/cc6_8.rego

  - code: CC7.1
    title: Vulnerability detection
    description: |
      To meet its objectives, the entity uses detection and monitoring
      procedures to identify changes to configurations that result in
      the introduction of new vulnerabilities. Evaluated against AWS
      Config being enabled and the presence of Security Hub findings.
    severity: medium
    policy_path: soc2_2017/cc7_1.rego

  - code: CC7.2
    title: System monitoring
    description: |
      The entity monitors system components and the operation of
      controls to detect anomalies. Evaluated against CloudTrail
      coverage (multi-region trail, log file validation enabled).
    severity: high
    policy_path: soc2_2017/cc7_2.rego

  - code: CC7.3
    title: Security event analysis
    description: |
      The entity evaluates security events to determine whether they
      could result in a failure of the entity to meet its objectives.
      Evaluated against GuardDuty findings older than N hours without
      acknowledgement.
    severity: medium
    policy_path: soc2_2017/cc7_3.rego

  - code: CC7.4
    title: Incident response
    description: |
      The entity responds to identified security incidents by
      executing a defined incident response program. Evaluated against
      the presence of an incident-response runbook reference on the
      org (manual evidence).
    severity: medium
    policy_path: soc2_2017/cc7_4.rego

  - code: CC7.5
    title: Recovery procedures
    description: |
      The entity identifies, develops, and implements activities to
      recover from identified security incidents. Evaluated against
      RDS automated backups, S3 versioning on critical buckets, and
      backup retention windows.
    severity: medium
    policy_path: soc2_2017/cc7_5.rego
