<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<!-- Resolve theme before first paint to avoid flash of wrong theme -->
		<script>
			(function () {
				try {
					var s = localStorage.getItem('theme');
					var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
					var t = s || (d ? 'dark' : 'light');
					var forge = localStorage.getItem('forge') || '';
					var h = document.documentElement;
					h.classList.remove('dark', 'light', 'hot-forge', 'neutral-forge', 'ember-forge', 'frost-forge', 'gold-forge');
					h.classList.add(t);
					if (forge === 'hot') h.classList.add('hot-forge');
					if (forge === 'neutral') h.classList.add('neutral-forge');
					if (forge === 'ember') h.classList.add('ember-forge');
					if (forge === 'frost') h.classList.add('frost-forge');
					if (forge === 'gold') h.classList.add('gold-forge');
				} catch (e) {}
			})();
		</script>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Touchstone — self-hosted compliance evidence collector" />
		<meta property="og:title" content="Touchstone" />
		<meta property="og:description" content="Self-hosted compliance evidence collector" />
		%sveltekit.head%
	</head>
	<body class="bg-zinc-950 antialiased" data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
